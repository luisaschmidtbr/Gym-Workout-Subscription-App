<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitFlex | Join Now</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>FitFlex Workout Subscription</h1>
    <nav aria-label="Main navigation">
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="plans.html">Plans</a></li>
        <li><a href="join.html">Join Now</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Join FitFlex</h2>
      <p>
        Complete the form below to choose your membership and tell us about your goals.
      </p>
    </section>

    <section class="form-section">
      <form action="#" method="post">
        <fieldset>
          <legend>Member Information</legend>

          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" required />

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />

          <label for="plan">Choose a Plan</label>
          <select id="plan" name="plan">
            <option value="starter">Starter</option>
            <option value="pro">Pro</option>
            <option value="elite">Elite</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Fitness Preferences</legend>

          <p class="form-label">Primary Goal</p>
          <label><input type="radio" name="goal" value="weight-loss" required /> Weight Loss</label>
          <label><input type="radio" name="goal" value="muscle-gain" /> Muscle Gain</label>
          <label><input type="radio" name="goal" value="endurance" /> Endurance</label>

          <p class="form-label">Workout Interests</p>
          <label><input type="checkbox" name="interests" value="strength" /> Strength Training</label>
          <label><input type="checkbox" name="interests" value="cardio" /> Cardio</label>
          <label><input type="checkbox" name="interests" value="yoga" /> Yoga</label>
          <label><input type="checkbox" name="interests" value="hiit" /> HIIT</label>

          <label for="notes">Additional Notes</label>
          <textarea id="notes" name="notes" rows="4" placeholder="Tell us about your fitness goals..."></textarea>
        </fieldset>

        <button type="submit">Submit Membership Request</button>
      </form>
    </section>
  </main>
</body>
</html>
